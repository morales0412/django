<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h2>Libros en existencia</h2>
    <!-- {{variable}} = se usa para mostrar el valor de una variable en el template -->
    {# {{variable | filtro}} = se usa para aplicar un filtro a una variable en el template #}
    <p>Nombre: {{nombre}}</p>
    <p>Autor: {{ autor}}</p>
    <p>Fecha: {{fecha_hoy | date:"d/m/Y H:i"}}</p>
    <p>Precio: {{precio}}</p>

    <a href="{% url 'detalle_libro' %}"> detalles </a>

</body>
</html>
